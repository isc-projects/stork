image: registry.gitlab.isc.org/isc-projects/stork/ci-base:9

# Only create pipelines for merge requests and pushes/merges to the main branch
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_COMMIT_REF_NAME =~ /^stork_v[0-9]+_[0-9]+$/)'

variables:
  POSTGRES_ADDR: postgres:5432
  POSTGRES_DB: storktest
  POSTGRES_USER: storktest
  POSTGRES_PASSWORD: storktest
  STORK_DATABASE_MAINTENANCE_NAME: "postgres"
  STORK_DATABASE_MAINTENANCE_USER_NAME: "storktest"
  STORK_DATABASE_MAINTENANCE_PASSWORD: "storktest"

  # this is used to build docker images of stork (using DIND)
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""  # this is workaround for TLS problem https://about.gitlab.com/blog/2019/07/31/docker-in-docker-with-docker-19-dot-03/

  # Force Unicode
  LC_ALL: C.UTF-8
  LANG: C.UTF-8

  # The hooks are specified as the git submodules. It allows us to pin the
  # specific commit to release. It is beneficial as the hook development may
  # not be in sync with the main project development.
  # The hooks are not needed in the most of CI tasks, so the repositories are
  # not cloned by default.
  GIT_SUBMODULE_STRATEGY: none

  # SLSA - enable artifact provenance metadata
  RUNNER_GENERATE_ARTIFACTS_METADATA: "true"

  # Download Python packages to cached location.
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/tools/python/pip_cache"


default:
  # AWS can interrupt the spot instance anytime, so let's retry the job when
  # the interruption event happens to avoid a pipeline failure.
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# stages order
stages:
  - cache
  - build
  - checks
  - hooks
  - deploy

### job templates ###
.job_template: &job_template
  tags:
    - linux
    - aws
    - runner-manager
    - amd64

.job_template_arm: &job_template_arm
  tags:
    - linux
    - aws
    - runner-manager
    - aarch64

.job_template_alpine: &job_template_alpine
  image: registry.gitlab.isc.org/isc-projects/stork/pkgs-alpine:13
  variables:
    # CGO is disabled by default in official images from Go 1.23.
    CGO_ENABLED: 1

.job_template_redhat: &job_template_redhat
  image: registry.gitlab.isc.org/isc-projects/stork/pkgs-redhat-ubi:9

.job_template_debian11: &job_template_debian11
  image: ruby:3.3.5-bullseye

### caches templates ###
.golang_cache: &golang_cache
  paths:
    - tools/golang
  policy: pull

.python_cache: &python_cache
  paths:
    - tools/python
  policy: pull

.nodejs_cache: &nodejs_cache
  paths:
    - tools/nodejs
  policy: pull

.golang_amd64_cache: &golang_amd64_cache
  key: golang_amd64
  <<: *golang_cache

.golang_arm64_cache: &golang_arm64_cache
  key: golang_arm64
  <<: *golang_cache

.golang_amd64_cache_alpine: &golang_amd64_cache_alpine
  key: golang_amd64_alpine
  <<: *golang_cache

.golang_arm64_cache_alpine: &golang_arm64_cache_alpine
  key: golang_arm64_alpine
  <<: *golang_cache

.nodejs_amd64_cache: &nodejs_amd64_cache
  key: nodejs_amd64
  <<: *nodejs_cache

.nodejs_arm64_cache: &nodejs_arm64_cache
  key: nodejs_arm64
  <<: *nodejs_cache

.python_amd64_cache: &python_amd64_cache
  key: python_amd64
  <<: *python_cache

.python_arm64_cache: &python_arm64_cache
  key: python_arm64
  <<: *python_cache

.python_amd64_cache_alpine: &python_amd64_cache_alpine
  key: python_amd64_alpine
  <<: *python_cache

.python_arm64_cache_alpine: &python_arm64_cache_alpine
  key: python_arm64_alpine
  <<: *python_cache

.python_amd64_cache_redhat: &python_amd64_cache_redhat
  key: python_amd64_redhat
  <<: *python_cache

.python_arm64_cache_redhat: &python_arm64_cache_redhat
  key: python_arm64_redhat
  <<: *python_cache

.playwright_browsers_cache: &playwright_browsers_cache
  key: playwright_browsers
  paths:
    - tools/playwright_browsers
  policy: pull

### stage: cache ###
# common parts used in stage jobs
.cache_job_template: &cache_job_template
  <<: *job_template
  stage: cache
  needs: [ ]
  allow_failure: true
.cache_job_template_debian: &cache_job_template_debian
  <<: *cache_job_template
  rules:
    - changes:
        paths:
  #      - .gitlab-ci.yml
          - webui/package.json
          - webui/package-lock.json
          - backend/go.mod
          - backend/go.sum
          - rakelib/*
          - rakelib/**/*
        compare_to: "$CI_COMMIT_REF_SLUG~1"
#    - when: manual
#      allow_failure: true
.cache_job_template_alpine: &cache_job_template_alpine
  <<: *cache_job_template
  <<: *job_template_alpine
  rules:
    - changes:
        paths:
  #      - .gitlab-ci.yml
          - backend/go.mod
          - backend/go.sum
          - rakelib/*
          - rakelib/**/*
        compare_to: "$CI_COMMIT_REF_SLUG~1"
#    - when: manual
#      allow_failure: true
  script:
    - rake prepare:dist
    - rake prepare:deps
.cache_job_template_redhat: &cache_job_template_redhat
  <<: *cache_job_template
  <<: *job_template_redhat
  rules:
    - changes:
        paths:
#      - .gitlab-ci.yml
          - rakelib/*
          - rakelib/**/*
        compare_to: "$CI_COMMIT_REF_SLUG~1"
#    - when: manual
#      allow_failure: true
  script:
    - rake prepare:sphinx_deps

# jobs
rebuild_cache_amd64:
  <<: *cache_job_template_debian
  cache:
    - <<: *golang_amd64_cache
      policy: push
    - <<: *python_amd64_cache
      policy: push
    - <<: *nodejs_amd64_cache
      policy: push
    - <<: *playwright_browsers_cache
      policy: push
  script:
    - rake prepare
    - rake prepare:dev
    - rake prepare:deps

rebuild_cache_arm64:
  <<: *cache_job_template_debian
  <<: *job_template_arm
  cache:
    - <<: *golang_arm64_cache
      policy: push
    - <<: *python_arm64_cache
      policy: push
    - <<: *nodejs_arm64_cache
      policy: push
  script:
    - rake prepare
    - rake prepare:deps

rebuild_cache_amd64_alpine:
  <<: *cache_job_template_alpine
  cache:
    - <<: *golang_amd64_cache_alpine
      policy: push
    - <<: *python_amd64_cache_alpine
      policy: push

rebuild_cache_arm64_alpine:
  <<: *cache_job_template_alpine
  <<: *job_template_arm
  cache:
    - <<: *golang_arm64_cache_alpine
      policy: push
    - <<: *python_arm64_cache_alpine
      policy: push

rebuild_cache_amd64_redhat:
  <<: *cache_job_template_redhat
  cache:
    - <<: *python_amd64_cache_redhat
      policy: push

rebuild_cache_arm64_redhat:
  <<: *cache_job_template_redhat
  <<: *job_template_arm
  cache:
    - <<: *python_arm64_cache_redhat
      policy: push

### stage: build ###
# common parts used in stage jobs
.build_template: &build_template
  <<: *job_template
  stage: build
  rules:
    - when: always
  needs:
    - job: rebuild_cache_amd64
      optional: true
      artifacts: false
.build_template_arm: &build_template_arm
  <<: *build_template
  <<: *job_template_arm

# jobs
build_ui:
  <<: *build_template
  cache:
    - *nodejs_amd64_cache
    - *golang_amd64_cache
    - *python_amd64_cache
  script:
    - rake build:ui
  artifacts:
    name: "ui"
    expire_in: 1 week
    paths:
      - webui/dist/stork/

build_doc:
  <<: *build_template
  cache:
    - *python_amd64_cache
  script:
    - rake build:doc
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  artifacts:
    name: "doc"
    expire_in: 1 week
    paths:
      - doc/build/

build_backend_amd64:
  <<: *build_template
  cache:
    - *golang_amd64_cache
    - *nodejs_amd64_cache ## because npm yamlinc is used
  script:
    - rake build:backend
  artifacts:
    untracked: true
    expire_in: 1 hour

build_backend_arm64:
  extends: build_backend_amd64
  <<: *job_template_arm
  cache:
    - *golang_arm64_cache
    - *nodejs_arm64_cache ## because npm yamlinc is used
  needs:
    - job: rebuild_cache_arm64
      optional: true
  variables:
    ARCH: arm64

build_backend_legacy_amd64:
  <<: *build_template
  rules:
    - when: on_success
  # Use image based on Debian 11. It is required to build the binaries with
  # the older GLIBC version.
  <<: *job_template_debian11
  needs:
    - build_backend_amd64
  script:
    - rake rebuild:backend SUPPRESS_PREREQUISITES=true
  artifacts:
    name: "backend"
    expire_in: 1 week
    paths:
      - backend/cmd/stork-agent/stork-agent
      - backend/cmd/stork-server/stork-server
      - backend/cmd/stork-tool/stork-tool

build_backend_legacy_arm64:
  extends: build_backend_legacy_amd64
  <<: *job_template_arm
  needs:
    - build_backend_arm64
  variables:
    ARCH: arm64

tarball:
  <<: *build_template
  needs: [ ]
  script:
    - rake release:tarball
  artifacts:
    paths:
      - stork-*.tar.gz
    expire_in: 1 week

### build rpm & deb packages ###

build_debs_amd64:
  <<: *build_template
  cache:
    - *golang_amd64_cache
    - *python_amd64_cache
    - *nodejs_amd64_cache
  needs:
    # Use the binaries compiled by the legacy image.
    - build_backend_legacy_amd64
  script:
    - rake build:agent_pkg SUPPRESS_PREREQUISITES=true
    - rake build:server_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/pkgs/*.deb ./
  artifacts:
    paths:
      - isc-stork-*.deb
    expire_in: 1 hour

build_debs_arm64:
  <<: *build_template_arm
  cache:
    - *golang_arm64_cache
    - *python_arm64_cache
    - *nodejs_arm64_cache
  needs:
    # Use the binaries compiled by the legacy image.
    - build_backend_legacy_arm64
  script:
    - rake build:agent_pkg SUPPRESS_PREREQUISITES=true
    - rake build:server_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/pkgs/*.deb ./
  artifacts:
    paths:
      - isc-stork-*.deb
    expire_in: 1 hour

build_rpms_amd64:
  <<: *build_template
  <<: *job_template_redhat
  cache:
    - *golang_amd64_cache
    - *python_amd64_cache_redhat
    - *nodejs_amd64_cache
  needs:
    # Use the binaries compiled by the legacy image.
    - build_backend_legacy_amd64
#    - job: rebuild_cache_amd64_redhat
#      optional: true
#      artifacts: false
  script:
    - rake build:agent_pkg SUPPRESS_PREREQUISITES=true
    - rake build:server_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/pkgs/*.rpm ./
  artifacts:
    paths:
      - isc-stork-*.rpm
    expire_in: 1 hour

build_rpms_arm64:
  <<: *build_template_arm
  <<: *job_template_redhat
  cache:
    - *golang_arm64_cache
    - *python_arm64_cache_redhat
    - *nodejs_arm64_cache
  needs:
    # Use the binaries compiled by the legacy image.
    - build_backend_legacy_arm64
#    - job: rebuild_cache_arm64_redhat
#      optional: true
  script:
    - rake build:agent_pkg SUPPRESS_PREREQUISITES=true
    - rake build:server_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/pkgs/*.rpm ./
  artifacts:
    paths:
      - isc-stork-*.rpm
    expire_in: 1 hour

build_apks_amd64:
  <<: *build_template
  <<: *job_template_alpine
  cache:
    - *golang_amd64_cache_alpine
    - *python_amd64_cache_alpine
    - *nodejs_amd64_cache
  needs:
    - job: rebuild_cache_amd64
      optional: true
    - job: rebuild_cache_amd64_alpine
      optional: true
  script:
    - rake build:agent_pkg
    - rake build:server_pkg
    - cp dist/pkgs/*.apk ./
  artifacts:
    paths:
      - isc-stork-*.apk
    expire_in: 1 hour

build_apks_arm64:
  <<: *build_template_arm
  <<: *job_template_alpine
  cache:
    - *golang_arm64_cache_alpine
    - *python_arm64_cache_alpine
    - *nodejs_arm64_cache
  needs:
    - job: rebuild_cache_arm64
      optional: true
    - job: rebuild_cache_arm64_alpine
      optional: true
  script:
    - rake build:agent_pkg
    - rake build:server_pkg
    - cp dist/pkgs/*.apk ./
  artifacts:
    paths:
      - isc-stork-*.apk
    expire_in: 1 hour

packages:
  <<: *build_template
  rules:
    - when: on_success
  needs:
    - build_debs_amd64
    - build_debs_arm64
    - build_rpms_amd64
    - build_rpms_arm64
    - build_apks_amd64
    - build_apks_arm64
  script:
    - ":"
  artifacts:
    paths:
      - isc-stork-*
    expire_in: 1 week

### stage: checks ###
# common parts used in stage jobs
.checks_template: &checks_template
  <<: *job_template
  stage: checks
  needs:
    - job: rebuild_cache_amd64
      optional: true
.checks_template_arm: &checks_template_arm
  <<: *checks_template
  <<: *job_template_arm

# jobs

lint_backend:
  <<: *checks_template
  cache:
    - *golang_amd64_cache
    - *nodejs_amd64_cache
  script:
    - rake lint:backend

lint_changelog:
  <<: *checks_template
  needs: [ ]
  script:
    - rake lint:changelog

lint_python_pylint:
  <<: *checks_template
  cache:
    - *python_amd64_cache
    - *nodejs_amd64_cache
    - *golang_amd64_cache
  script:
    - rake lint:python:pylint

lint_python_flake8:
  <<: *checks_template
  cache:
    - *python_amd64_cache
  script:
    - rake lint:python:flake8

lint_python_black:
  <<: *checks_template
  cache:
    - *python_amd64_cache
  script:
    - rake lint:python:black

unittest_backend:
  <<: *checks_template
  cache:
    - *golang_amd64_cache
  services:
    - name: postgres:18-alpine
      alias: postgres
  variables:
    # CGO is required by the race detector.
    CGO_ENABLED: 1
    PRESERVE_COVERAGE: "true"
  coverage: '/Total coverage:\s+\d+.\d+%/'
  script:
    - echo 'postgres:*:*:storktest:storktest' > ~/.pgpass
    - chmod 600 ~/.pgpass
    - rake unittest:backend
  artifacts:
    when: always
    paths:
      - backend/junit.xml
      - backend/coverage.cobertura.xml
    reports:
      junit: backend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.cobertura.xml

lint_ui:
  <<: *checks_template
  cache:
    - *nodejs_amd64_cache
    - *golang_amd64_cache
  script:
    - rake lint:ui

unittest_ui:
  <<: *checks_template
  cache:
    - *nodejs_amd64_cache
    - *golang_amd64_cache
    - *playwright_browsers_cache
  script:
    - rake unittest:ui
  artifacts:
    when: always
    paths:
      - webui/junit.xml
    reports:
      junit: webui/junit.xml

storybook_tests:
  <<: *checks_template
  cache:
    - *nodejs_amd64_cache
    - *golang_amd64_cache
    - *playwright_browsers_cache
  allow_failure: true
  script:
    - rake unittest:storybook
  rules:
    - when: manual

danger:
  <<: *checks_template
  needs: [ ]
  before_script:
    - export CI_MERGE_REQUEST_ID=$(git ls-remote -q origin merge-requests\*\head | grep $CI_COMMIT_SHA | sed 's/.*refs\/merge-requests\/\([0-9]*\)\/head/\1/g')
    - export CI_PROJECT_PATH=$CI_PROJECT_ID #some version of gitlab has problems with searching by project path
    - export DANGER_GITLAB_HOST=gitlab.isc.org
    - export DANGER_GITLAB_API_BASE_URL=https://gitlab.isc.org/api/v4
  script:
    - rake lint:git

lint_shell:
  <<: *checks_template
  needs: [ ]
  script:
    - rake lint:shell

### install packages ###

install_debs_amd64:
  <<: *checks_template
  variables:
    ARCH: amd64
  script:
    - "dpkg -i isc-stork-*${ARCH}.deb"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "dpkg -i isc-stork-*${ARCH}.deb"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "man stork-agent > /dev/null"
    - "man stork-server > /dev/null"
    - "man stork-tool > /dev/null"
    - "dpkg -r isc-stork-agent"
    - "dpkg -r isc-stork-server"
  needs:
    - build_debs_amd64

install_debs_amd64_ubuntu_lts:
  <<: *checks_template
  image: ubuntu:20.04
  variables:
    ARCH: amd64
  script:
    - "dpkg -i isc-stork-*${ARCH}.deb"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "dpkg -i isc-stork-*${ARCH}.deb"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "man stork-agent > /dev/null"
    - "man stork-server > /dev/null"
    - "man stork-tool > /dev/null"
    - "dpkg -r isc-stork-agent"
    - "dpkg -r isc-stork-server"
  needs:
    - build_debs_amd64

install_debs_arm64:
  extends: install_debs_amd64
  <<: *checks_template_arm
  variables:
    ARCH: arm64
  needs:
    - build_debs_arm64

install_rpms_amd64:
  <<: *checks_template
  <<: *job_template_redhat
  variables:
    ARCH: x86_64
  script:
    - "rpm -i isc-stork-*${ARCH}.rpm"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "rpm -U --force isc-stork-*${ARCH}.rpm"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "man stork-agent > /dev/null"
    - "man stork-server > /dev/null"
    - "man stork-tool > /dev/null"
    - "rpm -e isc-stork-agent"
    - "rpm -e isc-stork-server"
  needs:
    - build_rpms_amd64

install_rpms_arm64:
  extends: install_rpms_amd64
  <<: *checks_template_arm
  variables:
    ARCH: aarch64
  needs:
    - build_rpms_arm64

install_apks_amd64:
  <<: *checks_template
  <<: *job_template_alpine
  variables:
    ARCH: x86_64
  script:
    - "apk add --no-cache --allow-untrusted isc-stork-*${ARCH}.apk"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "apk add --no-cache --allow-untrusted isc-stork-*${ARCH}.apk"
    - "stork-agent --version"
    - "stork-server --version"
    - "stork-tool --version"
    - "man stork-agent > /dev/null"
    - "man stork-server > /dev/null"
    - "man stork-tool > /dev/null"
    - "apk del isc-stork-agent"
    - "apk del isc-stork-server"
  needs:
    - build_apks_amd64
  artifacts:
    paths:
      - core.*
    expire_in: 1 week
    when: always

install_apks_arm64:
  extends: install_apks_amd64
  <<: *job_template_arm
  variables:
    ARCH: aarch64
  needs:
    - build_apks_arm64

### system testing ###

system_test:
  <<: *checks_template
  needs: [ ]
  services:
    - docker:dind
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_COMMIT_REF_NAME =~ /^stork_v[0-9]+_[0-9]+$/)'
      when: always
    - when: manual
      allow_failure: true
  image: registry.gitlab.isc.org/isc-projects/stork/pkgs-compose:12
  #  cache:
  #    key: $CI_PROJECT_NAME-compose-$CI_COMMIT_REF_SLUG
  #    paths:
  #      - tools/
  #    fallback_keys:
  #      - $CI_PROJECT_NAME-compose-$CI_DEFAULT_BRANCH
  before_script:
    - ip -6 route del default
    - rake prepare:systemtest
  variables:
    BIND9_VERSION: latest-stable
    KEA_VERSION: latest-stable
    # Alpine uses the libc-musl library, which isn't compatible with the NodeJS
    # binary fetched by the Rake script. Additionally, the binaries for alpine
    # are missing on the NodeJS page. We cannot use the image based on Debian
    # because it is out-of-date.
    USE_SYSTEM_NODEJS: "true"
    # It must be an alias of the docker:dind service.
    DEFAULT_MAPPED_ADDRESS: "docker"
  script:
    # - rake system_tests_ui
    - rake systemtest
  artifacts:
    paths:
      - tests/system/test-results/
    exclude:
      - tests/system/test-results/**/performance-charts.html
    expire_in: 6 months
    when: always
    reports:
      junit: tests/system/test-results/junit.xml

system_test_old_stables:
  extends: system_test
  variables:
    BIND9_VERSION: old-stable
    KEA_VERSION: old-stable
    ONLY_KEA_TESTS: "true"
  script:
    - rake systemtest

system_test_latest_devs:
  extends: system_test
  variables:
    BIND9_VERSION: latest-dev
    KEA_VERSION: latest-dev
    ONLY_KEA_TESTS: "true"
  script:
    - rake systemtest

### hooks ###
# common parts used in stage jobs
.hooks_template: &hooks_template
  <<: *job_template
  stage: hooks
  needs:
    - job: rebuild_cache_amd64
      optional: true
.hooks_template_arm: &hooks_template_arm
  <<: *hooks_template
  <<: *job_template_arm

# jobs

build_hooks_amd64:
  <<: *hooks_template
  when: always
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  cache:
    - *golang_amd64_cache
  script:
    - rake hook:build
  artifacts:
    untracked: true
    expire_in: 1 hour

build_hooks_arm64:
  extends: build_hooks_amd64
  <<: *job_template_arm
  needs:
    - job: rebuild_cache_arm64
      optional: true
  cache:
    - *golang_arm64_cache
  variables:
    ARCH: arm64

build_hooks_legacy_amd64:
  <<: *hooks_template
  rules:
    - when: on_success
  # Use image based on Debian 11. It is required to build the binaries with
  # the older GLIBC version.
  <<: *job_template_debian11
  needs:
    - build_hooks_amd64
  # The submodules are not included in the artifacts even if the `untracked`
  # option is set. It is a bug in GitLab: https://gitlab.com/gitlab-org/gitlab-runner/-/issues/2457
  # We clone the fresh copy of the submodules. As long as our hooks need only
  # Golang to compile, it shouldn't be a problem.
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  script:
    # The hook:build rebuilds the binaries every time.
    - rake hook:build
  artifacts:
    paths:
      - hooks/*.so
    expire_in: 1 hour

build_hooks_legacy_arm64:
  extends: build_hooks_legacy_amd64
  <<: *job_template_arm
  needs:
    - build_hooks_arm64
  variables:
    ARCH: arm64

unittest_hooks:
  <<: *hooks_template
  when: always
  cache:
    - *golang_amd64_cache
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  script:
    - rake hook:unittest

tarball_hooks:
  <<: *hooks_template
  when: always
  needs: [ ]
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  script:
    - rake hook:tarball
  artifacts:
    paths:
      - stork-*-*.tar.gz
    expire_in: 1 week

build_hooks_debs_amd64:
  <<: *hooks_template
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  rules:
    - when: on_success
  needs:
    # Use the binaries compiled by the legacy image.
    - build_hooks_legacy_amd64
  cache:
    - *golang_amd64_cache
    - *python_amd64_cache
  script:
    - rake hook:build_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/hook-pkgs/*.deb ./
  artifacts:
    paths:
      - isc-stork-*.deb
    expire_in: 1 hour

build_hooks_debs_arm64:
  <<: *hooks_template_arm
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  rules:
    - when: on_success
  needs:
    # Use the binaries compiled by the legacy image.
    - build_hooks_legacy_arm64
  cache:
    - *golang_arm64_cache
    - *python_arm64_cache
  script:
    - rake hook:build_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/hook-pkgs/*.deb ./
  artifacts:
    paths:
      - isc-stork-*.deb
    expire_in: 1 hour

build_hooks_rpms_amd64:
  <<: *hooks_template
  <<: *job_template_redhat
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  rules:
    - when: on_success
  needs:
    # Use the binaries compiled by the legacy image.
    - build_hooks_legacy_amd64
  cache:
    - *golang_amd64_cache
    - *python_amd64_cache_redhat
  script:
    - rake hook:build_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/hook-pkgs/*.rpm ./
  artifacts:
    paths:
      - isc-stork-*.rpm
    expire_in: 1 hour

build_hooks_rpms_arm64:
  <<: *hooks_template_arm
  <<: *job_template_redhat
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  rules:
    - when: on_success
  needs:
    # Use the binaries compiled by the legacy image.
    - build_hooks_legacy_arm64
    - job: rebuild_cache_arm64_redhat
      optional: true
  cache:
    - *golang_arm64_cache
    - *python_arm64_cache_redhat
  script:
    - rake hook:build_pkg SUPPRESS_PREREQUISITES=true
    - cp dist/hook-pkgs/*.rpm ./
  artifacts:
