{

"Dhcp4": {
    "interfaces-config": {
        "interfaces": [ "*" ]
    },
    "control-socket": {
        "socket-type": "unix",
        "socket-name": "/var/run/kea/kea4-ctrl-socket"
    },
    "config-control": {
        "config-databases": [{
            "type": "mysql",
            "name": "agent_kea_premium",
            "user": "agent_kea_premium",
            "password": "agent_kea_premium",
            "host": "mariadb"
        }],
        "config-fetch-wait-time": 20
    },
    "lease-database": {
        "type": "mysql",
        "host": "mariadb",
        "name": "agent_kea_premium",
        "user": "agent_kea_premium",
        "password": "agent_kea_premium"
    },
    "expired-leases-processing": {
        "reclaim-timer-wait-time": 10,
        "flush-reclaimed-timer-wait-time": 25,
        "hold-reclaimed-time": 3600,
        "max-reclaim-leases": 100,
        "max-reclaim-time": 250,
        "unwarned-reclaim-cycles": 5
    },

    // We want very small timers here, so even small traffic (such as 1 pkt/sec) will
    // be able to fill the pool reasonably quickly. And then we could demonstrate
    // the addresses being expired.
    "renew-timer": 90,
    "rebind-timer": 120,
    "valid-lifetime": 180,

    "hooks-libraries": [
        {
          "library": "libdhcp_lease_cmds.so"
        },
        {
          "library": "libdhcp_stat_cmds.so"
        },
        {
          "library": "libdhcp_mysql.so"
        },
        {
          "library": "libdhcp_legal_log.so",
          "parameters": {
            "path": "/var/log/kea",
            "base-name": "kea-legal-log"
          }
        },
        {
            "library": "libdhcp_cb_cmds.so"
        }
    ],

    "loggers": [{
        "name": "kea-dhcp4",
        "output_options": [
            {
                "output": "stdout",
                "pattern": "%-5p %m\n"
            },
            {
                "output": "/var/log/kea/kea-dhcp4.log"
            }
        ],
        "severity": "DEBUG",
        "debuglevel": 0
    }]
}
}
