[program:named]
# The -f flag runs the daemon in the foreground while still writing logs to the
# files specified in the named.conf file. The logs are written to stdout and stderr
# allowing Docker to collect them. Writing to the files is required for the Stork
# agent to track zone transfers.
directory=/etc/bind
command=/usr/sbin/named -f -c /etc/bind/named.conf
autostart = true
autorestart = true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=5
priority=2
